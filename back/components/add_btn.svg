<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40" width="100%" height="100%">
    <defs>
        <style>
            /* Style de base du bouton */
            .btn-clickable {
                cursor: pointer;
            }
            .btn-bg {
                fill: rgba(20, 20, 20, 0.75);
                stroke: #ffcc00;
                stroke-width: 2;
                transition: fill 0.2s ease, stroke 0.2s ease;
            }
            .plus-line {
                stroke: #ffcc00;
                stroke-width: 4;
                stroke-linecap: round;
                transition: stroke 0.2s ease;
            }

            /* Effet au survol : tout s'inverse proprement */
            .btn-clickable:hover .btn-bg {
                fill: #ffcc00;
                stroke: #ffcc00;
            }
            .btn-clickable:hover .plus-line {
                stroke: #141414;
            }
        </style>
    </defs>

    <g class="btn-clickable">
        <path class="btn-bg" d="M 0,0 L 24,0 Q 40,0 40,16 L 40,40 L 10,40 Q 0,40 0,30 Z" />
        
        <line class="plus-line" x1="20" y1="11" x2="20" y2="29" />
        <line class="plus-line" x1="11" y1="20" x2="29" y2="20" />
    </g>
</svg>
